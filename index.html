<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cyber-AVIA Intelligence Dashboard</title>
  <meta name="description"
    content="Real-time aviation cyber-security monitoring dashboard with AI-powered anomaly detection">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
</head>

<body>

  <div class="app-container" id="dashboard">

    <!-- LEFT PANEL: Telemetry -->
    <aside class="panel">
      <div class="card">
        <div class="card-title">ELINT Pulse</div>
        <div id="livePulse" class="stat-value">—</div>
        <div class="stat-label">ACTIVE SENSORS ACQUIRED</div>
      </div>

      <div class="card">
        <div class="card-title">Threat Matrix</div>
        <div id="anomalyCount" class="stat-value" style="color: var(--danger);">0</div>
        <div class="stat-label">CRITICAL ANOMALIES</div>
      </div>

      <div class="card" style="flex: 1; min-height: 120px;">
        <div class="card-title">Security Audit Trail</div>
        <div id="securityLogs" style="overflow-y: auto; max-height: 300px;">
          <div class="log-line system">[BOOT] Cyber-AVIA v2.0 initializing...</div>
        </div>
      </div>
    </aside>

    <!-- CENTER: Strategic Map View -->
    <main class="main-view">
      <div class="top-nav">
        <div class="brand-title">
          <div class="brand-dot"></div>
          <div>CYBER-AVIA</div>
        </div>
        <div id="networkClock" class="clock">00:00:00</div>
        <div class="status-badge">● SYSTEM ONLINE</div>
      </div>
      <div id="map"></div>
    </main>

    <!-- RIGHT PANEL: Intelligence -->
    <aside class="panel">
      <div class="card">
        <div class="card-title">Intercept Target</div>
        <input type="text" id="icaoInput" class="cyber-input" placeholder="Callsign or HEX (e.g. THY123)" maxlength="10">
        <button onclick="searchICAO()" class="cyber-btn">INITIATE LOCK</button>
      </div>

      <div id="detailsCard" class="card" style="display: none;">
        <div class="card-title">Target Intel</div>
        <div id="detailsContent"></div>
      </div>

      <div class="card" style="flex: 1; min-height: 120px;">
        <div class="card-title">Alert Feed</div>
        <div id="alertList" style="overflow-y: auto; max-height: 400px;">
          <div class="log-line system">Scanning airspace...</div>
        </div>
      </div>
    </aside>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="script.js"></script>
</body>

</html>
