<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cyber-AVIA Intelligence Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body onload="initApp()">

  <!-- DASHBOARD LAYER -->
  <div class="app-container" id="dashboard">
    <!-- Sidebar Left: Telemetry -->
    <aside class="panel">
      <div class="card">
        <div class="card-title">LIVE STATUS</div>
        <div id="livePulse" class="stat-value">0</div>
        <div style="font-size: 0.8rem; color: var(--text-muted);">ACTIVE AIRCRAFTS</div>
      </div>

      <div class="card">
        <div class="card-title">ANOMALIES DETECTED</div>
        <div id="anomalyCount" class="stat-value" style="color: var(--danger);">0</div>
        <div style="font-size: 0.8rem; color: var(--text-muted);">HIGH RISK EVENTS</div>
      </div>

      <div id="logPanel" class="card" style="flex: 1; overflow-y: auto;">
        <div class="card-title">SECURITY LOGS</div>
        <div id="securityLogs" style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.6;">
          Waiting for telemetry...
        </div>
      </div>
    </aside>

    <!-- Center: Strategic View -->
    <main class="main-view">
      <div class="top-nav">
        <div class="brand-title">
          <div class="brand-dot"></div>
          <div>CYBER-AVIA <span style="font-weight: 300; font-size: 0.8rem; opacity: 0.6;">INTELLIGENCE</span></div>
        </div>
        <div id="networkClock" style="font-family: monospace; font-size: 1.1rem; color: var(--brand);">00:00:00</div>
        <div
          style="font-size: 0.7rem; color: var(--success); border: 1px solid var(--success); padding: 4px 10px; border-radius: 4px;">
          SYSTEM LIVE</div>
      </div>
      <div id="map"></div>
    </main>

    <!-- Sidebar Right: Search & Details -->
    <aside class="panel">
      <div class="card">
        <div class="card-title">AIRCRAFT LOOKUP</div>
        <input type="text" id="icaoInput" class="auth-input" style="height: 38px;" placeholder="ICAO HEX (e.g. 4B0011)">
        <button onclick="searchICAO()" class="auth-btn"
          style="padding: 10px; background: var(--brand); color: #000;">FIND RECORD</button>
      </div>

      <div id="detailsCard" class="card" style="display: none;">
        <div class="card-title">AIRCRAFT DATA</div>
        <div id="detailsContent" style="font-size: 0.85rem; line-height: 1.8;"></div>
      </div>

      <div id="alertHistory" class="card" style="flex: 1;">
        <div class="card-title">ALERT HISTORY</div>
        <div id="alertList" style="font-size: 0.75rem;"></div>
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>

</html>
